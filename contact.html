<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us — My Cabinet Planner</title>
<style>
  :root { --accent: #b45309; --text: #1e1409; --muted: #6b7280; --border: #e5e7eb; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', 'Segoe UI', -apple-system, sans-serif; color: var(--text); background: #faf9f7; line-height: 1.7; }
  header { background: #2c1f14; padding: 16px 5%; display: flex; align-items: center; gap: 12px; }
  header a { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  header span { color: #fff; font-size: 16px; font-weight: 700; }
  main { max-width: 560px; margin: 0 auto; padding: 64px 24px 100px; }
  h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; color: var(--text); }
  .sub { font-size: 15px; color: #374151; margin-bottom: 32px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
  input, select, textarea { width: 100%; padding: 10px 13px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--text); background: #fff; outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 110px; }
  .btn-primary { display: inline-block; background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 11px 28px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .btn-primary:hover { background: #92400e; }
  #contact-error { color: #ef4444; font-size: 12px; min-height: 16px; margin-top: 6px; }
  #contact-success { display: none; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 20px 24px; color: #15803d; font-size: 14px; margin-top: 16px; }
  a { color: var(--accent); }
  footer { text-align: center; padding: 24px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); margin-top: 60px; }
  footer a { color: var(--muted); text-decoration: none; margin: 0 8px; }
  footer a:hover { color: var(--accent); }
</style>
</head>
<body>

<header>
  <a href="/">
    <svg width="28" height="28" viewBox="0 0 52 52" fill="none">
      <rect x="1" y="1" width="50" height="50" rx="9" fill="url(#hg)"/>
      <rect x="7" y="7" width="38" height="38" rx="4" fill="none" stroke="rgba(200,168,130,0.45)" stroke-width="1.5"/>
      <rect x="21" y="30.5" width="10" height="7" rx="3.5" fill="#c8a882"/>
      <defs><linearGradient id="hg" x1="0" y1="0" x2="52" y2="52" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#5a3820"/><stop offset="100%" stop-color="#1e1208"/></linearGradient></defs>
    </svg>
    <span>My Cabinet Planner</span>
  </a>
</header>

<main>
  <h1>Contact Us</h1>
  <p class="sub">Have a question, found a bug, or want to share feedback? We'd love to hear from you.</p>

  <form id="contact-form" onsubmit="submitContact(event)">
    <div class="form-group">
      <label for="c-name">Your Name</label>
      <input type="text" id="c-name" placeholder="Jane Smith" required>
    </div>
    <div class="form-group">
      <label for="c-email">Email Address</label>
      <input type="email" id="c-email" placeholder="jane@company.com" required>
    </div>
    <div class="form-group">
      <label for="c-subject">Subject</label>
      <select id="c-subject" required>
        <option value="">Select a topic…</option>
        <option value="General Question">General Question</option>
        <option value="Pricing & Plans">Pricing &amp; Plans</option>
        <option value="Demo Request">Demo Request</option>
        <option value="Bug Report">Bug Report</option>
        <option value="Accessibility">Accessibility</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label for="c-message">Message</label>
      <textarea id="c-message" placeholder="Tell us how we can help…" required></textarea>
    </div>
    <div id="contact-error"></div>
    <button type="submit" class="btn-primary">Send Message</button>
  </form>

  <div id="contact-success">
    ✓ Message sent! We'll get back to you within one business day.
  </div>
</main>

<footer>
  <a href="/">Home</a>
  <a href="/privacy">Privacy Policy</a>
  <a href="/terms">Terms of Service</a>
  <a href="/accessibility">Accessibility</a>
  <br><br>
  © 2025 My Cabinet Planner. All rights reserved.
</footer>

<script>
function submitContact(e) {
  e.preventDefault();
  const name    = document.getElementById('c-name').value.trim();
  const email   = document.getElementById('c-email').value.trim();
  const subject = document.getElementById('c-subject').value;
  const message = document.getElementById('c-message').value.trim();
  const errEl   = document.getElementById('contact-error');
  if (!name || !email || !subject || !message) { errEl.textContent = 'Please fill in all fields.'; return; }
  errEl.textContent = '';
  const body = encodeURIComponent(`Name: ${name}\nEmail: ${email}\nSubject: ${subject}\n\n${message}`);
  const subjectLine = encodeURIComponent(`[My Cabinet Planner] ${subject}`);
  window.location.href = `mailto:dmstrtg@gmail.com?subject=${subjectLine}&body=${body}`;
  document.getElementById('contact-form').reset();
  document.getElementById('contact-success').style.display = 'block';
}
</script>
</body>
</html>
