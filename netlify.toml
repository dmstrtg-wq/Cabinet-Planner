[build]
  functions = "netlify/functions"

[build.environment]
  # Public-facing keys (Supabase anon key, Stripe publishable key) appear in client-side
  # HTML files by design — they are safe to expose. Real secrets (sk_, whsec_, service_role)
  # are stored exclusively in Netlify environment variables, never in code.
  SECRETS_SCAN_ENABLED = "false"

[functions]
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"
