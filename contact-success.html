<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent — My Cabinet Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--ink:#0f0805;--accent:#b45309;--bg:#faf7f4;--border:#e7ddd5;--muted:#78614f;}
body{font-family:'Inter',sans-serif;color:var(--ink);background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
.icon{font-size:48px;margin-bottom:24px;}
h1{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:900;margin-bottom:12px;}
p{font-size:15px;color:var(--muted);margin-bottom:32px;line-height:1.7;}
a{display:inline-block;padding:12px 28px;background:var(--accent);color:white;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none;}
a:hover{background:#92400e;}
</style>
</head>
<body>
  <div class="icon">✓</div>
  <h1>Message Sent!</h1>
  <p>Thanks for reaching out. We'll get back to you within one business day.</p>
  <a href="/">Back to Home</a>
</body>
</html>
